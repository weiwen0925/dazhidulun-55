.preface{max-width:880px;margin:50px auto 0;padding:0 28px;}
.preface h2{font-family:"Noto Serif TC",serif;font-size:30px;letter-spacing:6px;

  border-bottom:2px solid var(--border);padding-bottom:14px;}
.preface p{font-size:19px;line-height:2.1;text-indent:2em;color:var(--text);margin:0 0 18px;}

.toc-section{max-width:1100px;margin:50px auto 30px;padding:0 28px;}
.toc-title{font-family:"Noto Serif TC",serif;font-size:34px;

.toc-desc{text-align:center;color:var(--text-muted);font-size:17px;

.toc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));

.toc-card{display:flex;align-items:flex-start;gap:14px;

  border:1px solid var(--border);border-radius:12px;
  box-shadow:0 4px 20px rgba(91,58,41,.1);

.next-link:hover{background:linear-gradient(135deg,var(--gold),var(--goldL));

.read-progress{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:9px 24px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;backdrop-filter:blur(6px);
  transition:opacity .45s ease,transform .45s ease;
}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}

/* === back to top === */
#backTop{position:fixed;right:18px;bottom:18px;z-index:110;
  width:44px;height:44px;border-radius:50%;border:none;
  background:rgba(30,26,20,.92);color:var(--gold);
  font-size:20px;cursor:pointer;display:none;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
  border:1px solid rgba(184,134,11,.45);}
#backTop:hover{background:var(--gold);color:#fff;}
#backTop.show{display:block;}

/* === footer === */
.site-footer{
  background:#1e1a14;color:#a89464;padding:30px 24px;text-align:center;
  font-size:15px;letter-spacing:1.4px;line-height:1.9;margin-top:40px;
}

/* === Responsive === */
@media (max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .25s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:flex;align-items:center;justify-content:center;}
  .main{margin-left:0;}
  .hero-title{font-size:38px;letter-spacing:6px;}
  .hero-title-2{font-size:22px;letter-spacing:12px;}
  .ch-name{font-size:24px;letter-spacing:4px;}
  .toc-title{font-size:26px;letter-spacing:6px;}
  .preface h2{font-size:24px;letter-spacing:4px;}
}

<script>
(function(){
  // ========== anti-copy ==========
  var blk=function(e){e.preventDefault();return false;};
  ['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
    document.addEventListener(ev,blk,true);
  });
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')){blk(e);}
    if(k==='F12')blk(e);
    if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K')){blk(e);}
  },true);
  setInterval(function(){
    if(window.getSelection) try{window.getSelection().removeAllRanges();}catch(e){}
  },300);

  // ========== sb brand click ==========
  var sbBrand=document.getElementById('sbBrand');
  if(sbBrand){sbBrand.addEventListener('click',function(e){e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});});}

  // ========== mobile sidebar ==========
  var sbT=document.getElementById('sbToggle');
  var sb=document.getElementById('sb');
  if(sbT&&sb){sbT.addEventListener('click',function(){sb.classList.toggle('open');});}

  // ========== back to top ==========
  var bt=document.getElementById('backTop');
  if(bt){bt.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});}
  window.addEventListener('scroll',function(){
    if(bt){if(window.scrollY>600) bt.classList.add('show'); else bt.classList.remove('show');}
  },{passive:true});

  // ========== iframe auto-resize ==========
  function resizeFrame(f){
    try{
      var d=f.contentDocument||f.contentWindow.document;
      if(!d||!d.body) return;
      d.body.style.minHeight='0';
      d.body.style.height='auto';
      if(d.documentElement){
        d.documentElement.style.minHeight='0';
        d.documentElement.style.height='auto';
      }
      var h=d.body.scrollHeight;
      if(h>100){f.style.height=h+'px';f.style.minHeight='0';}
    }catch(e){}
  }
  function resizeAllFrames(){
    document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
    updateProgress();
  }
  function setupFrame(f){
    var tries=0;
    function tick(){
      tries++; resizeFrame(f);
      if(tries<30) setTimeout(tick,200);
    }
    if(f.contentDocument&&f.contentDocument.readyState==='complete') tick();
    else f.addEventListener('load',tick);
  }
  document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
  var rzT;
  window.addEventListener('resize',function(){clearTimeout(rzT);rzT=setTimeout(resizeAllFrames,200);});

  // ========== outer anchor smooth scroll w/ pre-resize ==========
  document.addEventListener('click',function(e){
    var a=e.target;
    while(a&&a.tagName!=='A') a=a.parentElement;
    if(!a) return;
    var h=a.getAttribute('href');
    if(!h||h.charAt(0)!=='#'||h.length<2) return;
    var id=h.substring(1);
    var el=document.getElementById(id);
    if(!el) return;
    e.preventDefault();
    resizeAllFrames();
    setTimeout(function(){
      resizeAllFrames();
      var rect=el.getBoundingClientRect();
      var y=window.scrollY+rect.top-20;
      window.scrollTo({top:y,behavior:'smooth'});
    },60);
  },true);

  // ========== global polling for first 15 s ==========
  var _rt=0,_riv=setInterval(function(){
    _rt++; resizeAllFrames();
    if(_rt>50) clearInterval(_riv);
  },300);

  // ========== read progress ==========
  var rpFill=document.getElementById('rpFill');
  var rpPct=document.getElementById('rpPct');
  function updateProgress(){
    var sh=document.documentElement.scrollHeight-window.innerHeight;
    var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
    if(rpFill) rpFill.style.width=pct+'%';
    if(rpPct) rpPct.textContent=Math.round(pct)+'%';
  }
  window.addEventListener('scroll',updateProgress,{passive:true});
  updateProgress();
  // hide near footer
  (function(){
    var cap=document.getElementById('readProgress');
    if(!cap) return;
    function setHide(on){cap.classList.toggle('hide-near-end',!!on);}
    var targets=[];
    var f1=document.querySelector('[data-wy-notice="v2"]');
    if(f1) targets.push(f1);
    var f2=document.querySelector('.site-footer');
    if(f2) targets.push(f2);
    if(!targets.length) return;
    if('IntersectionObserver' in window){
      var io=new IntersectionObserver(function(entries){
        var any=entries.some(function(e){return e.isIntersecting;});
        setHide(any);
      },{root:null,rootMargin:'0px 0px -20px 0px',threshold:0.01});
      targets.forEach(function(t){io.observe(t);});
    } else {
      var check=function(){
        var dh=document.documentElement.scrollHeight;
        var sb=window.scrollY+window.innerHeight;
        setHide(dh-sb<240);
      };
      window.addEventListener('scroll',check,{passive:true});
      check();
    }
  })();

  // ========== sidebar active highlight ==========
  var chapters=document.querySelectorAll('section.chapter');
  var sbItems=document.querySelectorAll('.sb-item');
  function syncActive(){
    var active=null;
    var threshold=window.innerHeight*0.35;
    chapters.forEach(function(c){
      var top=c.getBoundingClientRect().top;
      if(top<threshold) active=c;
    });
    if(!active) return;
    var id=active.id;
    var ch=id.replace('chapter-','');
    sbItems.forEach(function(it){
      if(it.getAttribute('data-ch')===ch) it.classList.add('active');
      else it.classList.remove('active');
    });
    // 自動捲動 sb 使 active 可見
    var sbWrap=document.getElementById('sb');
    var activeItem=document.querySelector('.sb-item.active');
    if(sbWrap&&activeItem){
      var ar=activeItem.getBoundingClientRect();
      var sr=sbWrap.getBoundingClientRect();
      if(ar.top<sr.top+20||ar.bottom>sr.bottom-20){
        var off=activeItem.offsetTop - sbWrap.clientHeight/2 + activeItem.clientHeight/2;
        sbWrap.scrollTo({top:off,behavior:'smooth'});
      }
    }
  }
  window.addEventListener('scroll',syncActive,{passive:true});
  syncActive();
})();
</script>

<script id="wy-print-intercept">
(function(){
  try{ window.print = function(){}; }catch(e){}
  document.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>
<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy55dzdl-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
